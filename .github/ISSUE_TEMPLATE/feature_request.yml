name: ✨ Feature request
description: Suggest a new capability for GeneralUpdate.Avalonia.Android.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        ![Feature emoji](https://github.githubassets.com/images/icons/emoji/unicode/2728.png?v8)

        Thanks for the suggestion. Please describe the scenario and expected value clearly.
  - type: textarea
    id: summary
    attributes:
      label: Feature summary
      description: What capability would you like to add?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives have you considered?
  - type: textarea
    id: impact
    attributes:
      label: Impact and compatibility
      description: Mention API, behavior, or migration impact if known.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add links, examples, or references.
