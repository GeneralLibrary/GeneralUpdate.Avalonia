name: Bug report
description: Report a reproducible problem in GeneralUpdate.Avalonia.Android.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough details for us to reproduce and fix it quickly.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What happened?
      placeholder: A concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide clear, numbered reproduction steps.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Tell us about your runtime and tooling.
      placeholder: |
        - Package version:
        - .NET SDK version:
        - Target framework: net8.0-android
        - Avalonia version:
        - Android version/device:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      description: Paste related logs or exceptions.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add links, screenshots, or anything else that helps.
